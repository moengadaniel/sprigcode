<svg xmlns="http://www.w3.org/2000/svg" width="760" height="300" viewBox="0 0 760 300" role="img" aria-labelledby="title desc">
  <title id="title">Sprigcode transaction flow</title>
  <desc id="desc">Agent or tool emits a typed transaction, Sprigcode resolves anchors and checks constraints, then returns a safe diff or typed refusal.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="760" height="300" fill="#ffffff"/>
  <g font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" text-anchor="middle">
    <rect x="48" y="86" width="160" height="72" rx="8" fill="#f8fafc" stroke="#94a3b8"/>
    <text x="128" y="116" font-size="18" font-weight="700" fill="#0f172a">Agent / Tool</text>
    <text x="128" y="140" font-size="13" fill="#475569">plans intent</text>

    <line x1="214" y1="122" x2="342" y2="122" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="278" y="100" font-size="13" fill="#475569">emits typed transaction</text>

    <rect x="348" y="78" width="160" height="88" rx="8" fill="#eef2ff" stroke="#64748b"/>
    <text x="428" y="113" font-size="20" font-weight="700" fill="#0f172a">Sprigcode</text>
    <text x="428" y="138" font-size="13" fill="#475569">resolves anchors</text>
    <text x="428" y="156" font-size="13" fill="#475569">checks constraints</text>

    <line x1="514" y1="122" x2="642" y2="122" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="578" y="100" font-size="13" fill="#475569">returns result</text>

    <rect x="648" y="64" width="64" height="44" rx="8" fill="#ecfdf5" stroke="#059669"/>
    <text x="680" y="91" font-size="13" font-weight="700" fill="#065f46">Safe diff</text>

    <rect x="632" y="136" width="96" height="44" rx="8" fill="#fff7ed" stroke="#ea580c"/>
    <text x="680" y="163" font-size="13" font-weight="700" fill="#9a3412">Typed refusal</text>
  </g>
</svg>
