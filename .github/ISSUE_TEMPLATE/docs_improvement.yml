name: Documentation improvement
description: Suggest a correction or clearer explanation for Sprigcode docs.
title: "[Docs] "
labels: ["documentation"]
body:
  - type: input
    id: page
    attributes:
      label: Page or file
      description: Which README, docs page, example, or package README should change?
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: Problem
      description: What is unclear, stale, unsupported, or missing?
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed improvement
      description: Describe the smallest useful docs change.
    validations:
      required: true
  - type: checkboxes
    id: claims
    attributes:
      label: Claim discipline
      options:
        - label: The proposed change does not add unsupported adoption, benchmark, security, or production-readiness claims.
          required: true
