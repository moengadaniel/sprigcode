name: Release Dry Run

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run test:golden
      - run: npm run build
      - run: npm run test:smoke
      - run: npm run test:npm-smoke
      - run: npm pack --workspaces --dry-run
